; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:nano33ble]
platform = nordicnrf52
board = nano33ble
framework = arduino
lib_deps =
    arduino-libraries/Arduino_BMI270_BMM150   ; 6-axis IMU + magnetometer (Rev2)
    arduino-libraries/Madgwick                ; sensor fusion -> roll/pitch/yaw
    arduino-libraries/Arduino_HS300x           ; temp/humidity (Rev2, replaces HTS221)
    arduino-libraries/Arduino_LPS22HB          ; pressure (same as Rev1)
    arduino-libraries/Arduino_APDS9960         ; gesture/light/proximity (same)
